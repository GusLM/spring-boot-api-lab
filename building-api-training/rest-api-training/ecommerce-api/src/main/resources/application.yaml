spring:
  application:
    name: ecommerce-api

# DATASOURCE
  datasource:
    driver-class-name: ${DB_DRIVER}
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

# H2 CLIENT
#  h2:
#    console:
#      enabled: ${H2_CONSOLE_ENABLED}
#      path: ${H2_CONSOLE_PATH}

# JPA, SQL
  jpa:
    defer-datasource-initialization: ${JPA_DEFER_DATASOURCE_INITIALIZATION}
    show-sql: ${JPA_SHOW_SQL}
    properties:
      hibernate:
        format_sql: ${JPA_FORMAT_SQL}

