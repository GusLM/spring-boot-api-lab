spring:
  config:
    import: optional:file:.env[.properties]
  test:
    database:
      replace: any
  datasource:
    url: jdbc:h2:mem:library-api-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
